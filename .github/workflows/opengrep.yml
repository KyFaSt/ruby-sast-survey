name: Opengrep Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  opengrep:
    name: Opengrep Static Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Install Opengrep
      run: |
        curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
        echo "$HOME/.opengrep/cli/latest" >> $GITHUB_PATH
        
    - name: Create results directory
      run: mkdir -p results-actions
        
    - name: Run Opengrep scan (community rules)
      run: |
        opengrep --config=auto --sarif --output=results-actions/opengrep-results.sarif .
        
    - name: Also generate JSON output (community rules)
      run: |
        opengrep --config=auto --json --output=results-actions/opengrep-results.json .
        
    - name: Run custom rules scan for comparison
      run: |
        opengrep --config=opengrep.yml --json --output=results-actions/opengrep-custom-results.json . || true
        
    - name: Upload Opengrep SARIF results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results-actions/opengrep-results.sarif
        category: opengrep
        
    - name: Upload results as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: opengrep-results
        path: results-actions/
