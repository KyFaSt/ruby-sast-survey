name: RuboCop Code Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  rubocop:
    name: RuboCop Static Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true
        
    - name: Create results directory
      run: mkdir -p results-actions
        
    - name: Run RuboCop scan
      run: |
        bundle exec rubocop --format json --out results-actions/rubocop-results.json
      continue-on-error: true
        
    - name: Convert RuboCop results to SARIF
      run: |
        cat > convert_rubocop_to_sarif.rb << 'EOF'
        require 'json'
        
        rubocop_data = JSON.parse(File.read('results-actions/rubocop-results.json'))
        
        sarif = {
          "$schema": "https://schemastore.azurewebsites.net/schemas/json/sarif-2.1.0.json",
          "version": "2.1.0",
          "runs": [{
            "tool": {
              "driver": {
                "name": "RuboCop",
                "version": rubocop_data["metadata"]["rubocop_version"],
                "informationUri": "https://rubocop.org/",
                "rules": []
              }
            },
            "results": []
          }]
        }
        
        rule_cache = {}
        
        rubocop_data["files"].each do |file|
          file["offenses"].each do |offense|
            rule_id = offense["cop_name"]
            
            # Add rule if not exists
            unless rule_cache[rule_id]
              sarif[:runs][0][:tool][:driver][:rules] << {
                id: rule_id,
                name: rule_id,
                shortDescription: { text: offense["message"] },
                fullDescription: { text: offense["message"] },
                defaultConfiguration: { 
                  level: offense["severity"] == "fatal" || offense["severity"] == "error" ? "error" : "warning" 
                }
              }
              rule_cache[rule_id] = true
            end
            
            result = {
              ruleId: rule_id,
              message: { text: offense["message"] },
              locations: [{
                physicalLocation: {
                  artifactLocation: { uri: file["path"] },
                  region: { 
                    startLine: offense["location"]["start_line"],
                    startColumn: offense["location"]["start_column"],
                    endLine: offense["location"]["last_line"],
                    endColumn: offense["location"]["last_column"]
                  }
                }
              }],
              level: offense["severity"] == "fatal" || offense["severity"] == "error" ? "error" : "warning"
            }
            
            sarif[:runs][0][:results] << result
          end
        end
        
        File.write('results-actions/rubocop-results.sarif', JSON.pretty_generate(sarif))
        EOF
        
        ruby convert_rubocop_to_sarif.rb
        
    - name: Upload RuboCop SARIF results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results-actions/rubocop-results.sarif
        category: rubocop
        
    - name: Upload results as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rubocop-results
        path: results-actions/
