name: AST-grep Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  ast-grep:
    name: AST-grep Static Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Install AST-grep
      run: |
        curl -fsSL https://github.com/ast-grep/ast-grep/releases/latest/download/ast-grep-x86_64-unknown-linux-gnu.tar.gz | tar -xz
        sudo mv ast-grep /usr/local/bin/
        
    - name: Create results directory
      run: mkdir -p results-actions
        
    - name: Run AST-grep scan
      run: |
        ast-grep scan --json=pretty > results-actions/ast-grep-results.json
        
    - name: Convert AST-grep results to SARIF
      run: |
        cat > convert_astgrep_to_sarif.rb << 'EOF'
        require 'json'
        
        begin
          astgrep_data = JSON.parse(File.read('results-actions/ast-grep-results.json'))
        rescue JSON::ParserError
          # Handle case where output is not valid JSON
          astgrep_data = []
        end
        
        sarif = {
          "$schema": "https://schemastore.azurewebsites.net/schemas/json/sarif-2.1.0.json",
          "version": "2.1.0",
          "runs": [{
            "tool": {
              "driver": {
                "name": "AST-grep",
                "version": "0.14.0",
                "informationUri": "https://ast-grep.github.io/",
                "rules": []
              }
            },
            "results": []
          }]
        }
        
        rule_cache = {}
        
        astgrep_data.each do |finding|
          rule_id = finding["rule_id"] || "unknown"
          
          # Add rule if not exists
          unless rule_cache[rule_id]
            sarif[:runs][0][:tool][:driver][:rules] << {
              id: rule_id,
              name: rule_id,
              shortDescription: { text: finding["message"] || "AST-grep finding" },
              fullDescription: { text: finding["message"] || "AST-grep security finding" },
              defaultConfiguration: { level: "warning" }
            }
            rule_cache[rule_id] = true
          end
          
          result = {
            ruleId: rule_id,
            message: { text: finding["message"] || "AST-grep security finding" },
            locations: [{
              physicalLocation: {
                artifactLocation: { uri: finding["file"] || finding["path"] || "unknown" },
                region: { 
                  startLine: finding["start_line"] || finding["range"]&.dig("start", "line") || 1,
                  startColumn: finding["start_col"] || finding["range"]&.dig("start", "column") || 1
                }
              }
            }],
            level: "warning"
          }
          
          sarif[:runs][0][:results] << result
        end
        
        File.write('results-actions/ast-grep-results.sarif', JSON.pretty_generate(sarif))
        EOF
        
        ruby convert_astgrep_to_sarif.rb
        
    - name: Upload AST-grep SARIF results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results-actions/ast-grep-results.sarif
        category: ast-grep
        
    - name: Upload results as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ast-grep-results
        path: |
          results-actions/ast-grep-results.json
          results-actions/ast-grep-results.sarif
