name: DevSkim Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  devskim:
    name: DevSkim Static Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Install DevSkim
      run: |
        dotnet tool install --global Microsoft.CST.DevSkim.CLI
        
    - name: Create results directory
      run: mkdir -p results-actions
        
    - name: Run DevSkim scan
      run: |
        devskim analyze -I . -O results-actions/devskim-results.sarif -f sarif
        devskim analyze -I . -O results-actions/devskim-results.json -f text
        
    - name: Upload DevSkim SARIF results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results-actions/devskim-results.sarif
        category: devskim
        
    - name: Upload results as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: devskim-results
        path: |
          results-actions/devskim-results.json
          results-actions/devskim-results.sarif
